name: WordBitesApp
options:
  bundleIdPrefix: com.rohitmahtani

packages:
  WordBitesKit:
    path: ../WordBitesKit

targets:
  WordBitesApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/WordBitesApp
    dependencies:
      - package: WordBitesKit
        product: WordBitesKit
    info:
      path: Sources/WordBitesApp/Info.plist
      properties:
        CFBundleDisplayName: "Word Bites"
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rohitmahtani.wordbites
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
