name: WordBitesApp Build

on:
  push:
    paths:
      - 'WordBitesApp/**'
      - 'WordBitesKit/**'
      - '.github/workflows/wordbitesapp-build.yml'
  pull_request:
    paths:
      - 'WordBitesApp/**'
      - 'WordBitesKit/**'
      - '.github/workflows/wordbitesapp-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: WordBitesApp
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project WordBitesApp.xcodeproj \
            -scheme WordBitesApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Package .ipa
        run: |
          set -e
          APP_PATH="build/Build/Products/Release-iphoneos/WordBitesApp.app"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r WordBitesApp.ipa Payload
          rm -rf Payload

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: WordBitesApp
          path: WordBitesApp/WordBitesApp.ipa
          retention-days: 14
